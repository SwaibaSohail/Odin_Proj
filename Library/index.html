<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 My Library</h1>
            <button id="new-book-btn" class="btn btn-primary">+ New Book</button>
        </header>

        <div id="library-display" class="library-grid">
            <!-- Books will be displayed here -->
        </div>

        <!-- Dialog for adding new books -->
        <dialog id="book-dialog">
            <div class="dialog-content">
                <h2>Add New Book</h2>
                <form id="book-form">
                    <div class="form-group">
                        <label for="title">Title:</label>
                        <input type="text" id="title" name="title" required>
                    </div>

                    <div class="form-group">
                        <label for="author">Author:</label>
                        <input type="text" id="author" name="author" required>
                    </div>

                    <div class="form-group">
                        <label for="pages">Pages:</label>
                        <input type="number" id="pages" name="pages" min="1" required>
                    </div>

                    <div class="form-group checkbox-group">
                        <label for="read">
                            <input type="checkbox" id="read" name="read">
                            I've read this book
                        </label>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Add Book</button>
                        <button type="button" id="cancel-btn" class="btn btn-secondary">Cancel</button>
                    </div>
                </form>
            </div>
        </dialog>
    </div>

    <script src="script.js"></script>
</body>
</html>
