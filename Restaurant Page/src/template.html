<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ember & Sage</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #d4a574;
            --dark: #1a1a1a;
            --cream: #faf8f3;
            --accent: #c84b31;
            --text-dark: #2d2d2d;
            --text-light: #8b7355;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--dark);
            color: var(--text-dark);
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(212, 165, 116, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(200, 75, 49, 0.08) 0%, transparent 50%);
        }

        /* Header with background image effect */
        header {
            position: relative;
            background: linear-gradient(135deg, #2a1a0f 0%, #1a1a1a 100%);
            padding: 1.5rem 0;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border-bottom: 2px solid var(--primary);
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 30% 0%, rgba(212, 165, 116, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 70% 100%, rgba(200, 75, 49, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        header::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(212, 165, 116, 0.03) 2px, rgba(212, 165, 116, 0.03) 4px);
            pointer-events: none;
        }

        nav {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            padding: 0 2rem;
        }

        nav button {
            background: rgba(212, 165, 116, 0.1);
            color: var(--primary);
            border: 1.5px solid var(--primary);
            padding: 0.75rem 2rem;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Montserrat', sans-serif;
            position: relative;
            overflow: hidden;
        }

        nav button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        nav button:hover::before {
            left: 100%;
        }

        nav button:hover {
            background: var(--primary);
            color: var(--dark);
            box-shadow: 0 8px 25px rgba(212, 165, 116, 0.3);
            transform: translateY(-2px);
        }

        nav button.active {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            box-shadow: 0 8px 25px rgba(212, 165, 116, 0.4);
        }

        #content {
            max-width: 1200px;
            margin: 4rem auto;
            padding: 3.5rem;
            background: linear-gradient(135deg, var(--cream) 0%, rgba(250, 248, 243, 0.95) 100%);
            border-radius: 8px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
            min-height: 500px;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.8s ease-out;
        }

        #content::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(212, 165, 116, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        #content::after {
            content: '';
            position: absolute;
            bottom: -100px;
            left: 0;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(200, 75, 49, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        #content > * {
            position: relative;
            z-index: 1;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--dark);
            margin-bottom: 1rem;
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -1px;
            position: relative;
            padding-bottom: 1rem;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 2px;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            color: var(--accent);
            margin-top: 2.5rem;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-dark);
            line-height: 1.8;
            margin-bottom: 1.2rem;
            font-size: 1rem;
            font-weight: 400;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav {
                gap: 1rem;
                padding: 0 1rem;
            }

            nav button {
                padding: 0.65rem 1.2rem;
                font-size: 0.85rem;
                letter-spacing: 0.5px;
            }

            #content {
                margin: 2rem 1rem;
                padding: 2rem 1.5rem;
            }

            h1 {
                font-size: 2rem;
            }

            h2 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav id="navbar">
            <!-- Navigation buttons will be inserted here by JavaScript -->
        </nav>
    </header>
    <div id="content"></div>
</body>
</html>
