<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up Form</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">
    <div class="sidebar">
      <div class="sidebar-background">
        <div class="logo-overlay">
          <img src="odin-lined.png" alt="Odin Logo" class="logo">
          <h1>Odin</h1>
        </div>
      </div>
    </div>
    
    <div class="main-content">
      <div class = "text">  
        <h2>Welcome to The Odin Project!</h2>
        <p>Your journey to becoming a web developer starts here. Join our community and access a wealth of resources, projects, and support to help you succeed.</p>
      </div>
      <form action="" method="get" class="signup-form">
        <div class="form-section">
          <h3>Let's do this!</h3>
          
          <div class="form-row">
            <div class="form-group">
              <label for="first-name">First Name</label>
              <input id="first-name" name="first-name" type="text" required />
            </div>
            <div class="form-group">
              <label for="last-name">Last Name</label>
              <input id="last-name" name="last-name" type="text" required />
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" placeholder="joe@example.com" required />
            </div>
            <div class="form-group">
              <label for="phone-number">Phone Number</label>
              <input id="phone-number" name="phone-number" type="tel" placeholder="+92 300 1234567" />
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label for="password">Password</label>
              <input id="password" name="password" type="password" required minlength="8" />
              <span class="error-message"> Password must be at least 8 characters</span>
            </div>
            <div class="form-group">
              <label for="confirm-password">Confirm Password</label>
              <input id="confirm-password" name="confirm-password" type="password" required />
              <span class="error-message"> Passwords do not match</span>
            </div>
          </div>
        </div>
        
        <div class="form-actions">
          <button type="submit">Create Account</button>
          <p class="login-link">Already have an account? <a href="#">Log in</a></p>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
